name: Build and publish Docker image

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check for upstream updates
        id: check
        run: |
          UPSTREAM_SHA=$(git ls-remote https://github.com/Shadowghost/jellyfin.git refs/heads/perf-rebased | cut -f1)
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          
          LAST_SHA=$(cat .last_upstream_sha 2>/dev/null || echo "")
          echo "last_sha=$LAST_SHA" >> $GITHUB_OUTPUT
          
          if [ "$UPSTREAM_SHA" = "$LAST_SHA" ]; then
            echo "No changes, skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected, building"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v5
        if: steps.check.outputs.should_build == 'true'

      - name: Clone Jellyfin source
        if: steps.check.outputs.should_build == 'true'
        run: |
          git clone --depth 1 --branch perf-rebased https://github.com/Shadowghost/jellyfin.git source

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.should_build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: steps.check.outputs.should_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/eatprilosec/jellyfin:latest
            ghcr.io/eatprilosec/jellyfin:${{ github.sha }}

      - name: Update last built SHA
        if: steps.check.outputs.should_build == 'true'
        run: |
          echo ${{ steps.check.outputs.upstream_sha }} > .last_upstream_sha
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .last_upstream_sha
            git commit -m "Update last upstream SHA to ${{ steps.check.outputs.upstream_sha }}" || echo "No changes to commit"
          git push
